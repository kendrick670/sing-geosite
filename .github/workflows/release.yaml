name: Release
on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *"
jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Create rule-set branch if not exists
        run: |
          if ! git show-ref --verify --quiet refs/heads/rule-set; then
            git checkout -b rule-set
            git push -u origin rule-set --force
          else
            git checkout rule-set
          fi
      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: ^1.25
      - name: Build
        run: |
          go run -v .
          sha256sum rule-set/geosite-gfw.srs > rule-set/geosite-gfw.srs.sha256sum
      - name: Commit and push
        run: |
          git config user.email "github-action@users.noreply.github.com"
          git config user.name "GitHub Action"
          git add -f rule-set/
          git diff --staged --quiet || git commit -m "$(date +%Y%m%d%H%M%S)"
          git push
      - name: Delete old releases
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          for tag in $(gh release list --limit 100 --json tagName --jq '.[3:].tagName'); do
            gh release delete "$tag" --yes
            git push --delete origin "$tag" 2>/dev/null || true
          done
      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(date +%Y%m%d%H%M%S)
          gh release create $VERSION --title $VERSION --target rule-set
