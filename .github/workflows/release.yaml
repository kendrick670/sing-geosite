name: Release
on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *"
jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: ^1.25
      - name: Build
        run: |
          go run -v .
          sha256sum rule-set/geosite-gfw.srs > rule-set/geosite-gfw.srs.sha256sum
      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(date +%Y%m%d%H%M%S)
          gh release create $VERSION \
            rule-set/geosite-gfw.srs \
            rule-set/geosite-gfw.srs.sha256sum
